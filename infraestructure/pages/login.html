<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de login</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="../assets/css/style.css">

</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">🛠️ DeskFlow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="painel.html">Painel</a></li>
                </ul>
            </div>
        </div>
    </nav>  

    <!--Cabeçalho-->
    <header class="text-center">
        <h2>Página de login</h2>
    </header>
    
    <!--Principal-->
    <main class="container">

        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">     

                <!--Seções-->
                <section>
                        <!--Formulario-->
                    <form action="painel.html" method="get">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome:</label>
                                <input type="text" class="form-control" id="nome" name="nome" placeholder="Digite seu nome" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email:</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="Digite seu email" required>
                            </div>

                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha:</label>
                                <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite sua senha" required minlength="4" pattern=".{4,}">
                            </div>

                                <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-custom">Entrar</button>
                                <a href="index.html" class="btn btn-secondary">Voltar</a>
                            </div>
                        </form>
                </section>
            </div>
        </div>
    </main>

    <!--Rodapé-->
    <footer>
        <p>© 2026 - Suporte Técnico de TI</p>
    </footer>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    
</body>
</html>
